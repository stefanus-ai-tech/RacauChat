<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apen's Brain Dump & History</title>
    <style>
        :root {
            --line-green: #06C755;
            --line-blue: #74a3cc;
            --sidebar-bg: #2c3e50;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #e6e6e6; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        .sidebar { width: 260px; background-color: var(--sidebar-bg); color: white; display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar-header { padding: 15px; background: #1a252f; text-align: center; }
        .history-list { flex: 1; overflow-y: auto; padding: 10px; }
        .history-item { 
            padding: 12px; margin-bottom: 8px; background: #34495e; border-radius: 6px; 
            cursor: pointer; font-size: 0.85em; border-left: 4px solid transparent;
        }
        .history-item:hover { background: #3e5871; }
        .history-item.active { border-left-color: var(--line-green); background: #3e5871; }
        .history-date { font-weight: bold; display: block; margin-bottom: 3px; }
        .history-snippet { opacity: 0.7; font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Main Chat Area */
        .app-container { flex: 1; display: flex; flex-direction: column; background-color: var(--line-blue); position: relative; }
        
        .header { background-color: #ffffff; padding: 10px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid #ddd; }
        .header-controls { display: flex; gap: 5px; flex-wrap: wrap; }
        input[type="password"], input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1; }
        
        button { border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; }
        .btn-new { background-color: var(--line-green); color: white; width: 100%; margin-bottom: 10px; }
        .btn-copy { background-color: #f39c12; color: white; }
        .btn-send { background-color: #333; color: white; }
        .btn-groq { background-color: var(--line-green); color: white; }

        .chat-window { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        /* Bubbles */
        .bubble-wrapper { display: flex; flex-direction: column; max-width: 85%; }
        .bubble-wrapper.user { align-self: flex-end; align-items: flex-end; }
        .bubble-wrapper.bot { align-self: flex-start; align-items: flex-start; }
        .bubble { padding: 10px 14px; border-radius: 18px; line-height: 1.4; word-wrap: break-word; }
        .user .bubble { background-color: #85e04e; border-top-right-radius: 4px; }
        .bot .bubble { background-color: #ffffff; border-top-left-radius: 4px; }
        
        .meta { font-size: 0.65em; color: #f1f1f1; margin-top: 4px; }
        .bot .meta { color: #555; }
        .read-mark { font-weight: bold; margin-right: 4px; }

        .input-area { background-color: #f5f5f5; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; resize: none; box-sizing: border-box; }
        .action-row { display: flex; gap: 8px; justify-content: flex-end; }

        /* Responsive Sidebar */
        @media (max-width: 768px) {
            .sidebar { width: 0; position: absolute; z-index: 10; height: 100%; }
            .sidebar.open { width: 240px; }
        }

        .history-item { position: relative; padding-right: 60px; } /* Beri ruang buat tombol */
        .item-actions { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); display: flex; gap: 3px; }
        .btn-small { padding: 4px 6px; font-size: 0.7em; background: #444; color: white; border-radius: 3px; }
        .btn-small.delete { background: #e74c3c; }
        .btn-small.edit { background: #3498db; }
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3>Chat History</h3>
        <button class="btn-new" onclick="createNewSession()">+ New Chat</button>
    </div>
    <div class="history-list" id="historyList">
        </div>
</aside>

<main class="app-container">
    <div class="header">
        <div class="header-controls">
            <button onclick="toggleSidebar()" style="background:#eee; color:#333">☰</button>
            <input type="password" id="groqApiKey" placeholder="Groq API Key">
            <input type="text" id="systemPrompt">

            <script>
            document.getElementById("systemPrompt").value = `Anda adalah entitas AI tingkat lanjut yang dirancang khusus untuk bertindak sebagai psikolog klinis, psikoanalis, dan pengamat perilaku dengan tingkat objektivitas absolut. Tugas utama Anda adalah mendekonstruksi dan menganalisis "racauan" (stream-of-consciousness/brain dump) dari pengguna.

            Pendekatan Analitik Anda:

            Dekonstruksi Kognitif: Identifikasi bias kognitif... (lanjutkan semua isi prompt di sini)
            `;
            </script>
            <button class="btn-copy" onclick="copyCurrentSession()">Copy JSON</button>
        </div>
    </div>

    <div class="chat-window" id="chatWindow"></div>

    <div class="input-area">
        <textarea id="messageInput" rows="3" placeholder="Meracau di sini..."></textarea>
        <div class="action-row">
            <button class="btn-send" onclick="sendUserMessage()">Send</button>
            <button class="btn-groq" onclick="requestGroqAnswer()">Ask Llama 4 Scout</button>
        </div>
    </div>
</main>

<script>
    const DB_KEY = 'apen_chat_vault';
    let allSessions = JSON.parse(localStorage.getItem(DB_KEY)) || [];
    let currentSessionId = null;

    window.onload = () => {
        if (allSessions.length > 0) {
            loadSession(allSessions[0].id);
        } else {
            createNewSession();
        }
        renderHistory();
    };

    function saveToDisk() {
        localStorage.setItem(DB_KEY, JSON.stringify(allSessions));
    }

// CREATE: Dengan Prompt Judul
function createNewSession() {
    let title = prompt("Kasih judul buat racauan kali ini:", "Sesi Meracau " + new Date().toLocaleDateString());
    if (title === null) return; // Batal kalau klik cancel

    const newId = Date.now();
    const newSession = {
        id: newId,
        title: title || "Tanpa Judul",
        timestamp: new Date().toISOString(),
        messages: []
    };
    allSessions.unshift(newSession);
    currentSessionId = newId;
    saveToDisk();
    renderHistory();
    renderChat();
}

// UPDATE: Rename Judul
function renameSession(id, event) {
    event.stopPropagation(); // Biar nggak malah buka chatnya
    const session = allSessions.find(s => s.id === id);
    let newTitle = prompt("Ubah judul:", session.title);
    if (newTitle) {
        session.title = newTitle;
        saveToDisk();
        renderHistory();
    }
}

// DELETE: Hapus Sesi
function deleteSession(id, event) {
    event.stopPropagation(); // Biar nggak buka chat
    if (confirm("Hapus permanen sesi ini?")) {
        allSessions = allSessions.filter(s => s.id !== id);
        if (currentSessionId === id) {
            currentSessionId = allSessions.length > 0 ? allSessions[0].id : null;
        }
        saveToDisk();
        renderHistory();
        renderChat();
    }
}

// READ: Render History dengan Tombol CRUD
function renderHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    
    allSessions.forEach(session => {
        const item = document.createElement('div');
        item.className = `history-item ${session.id === currentSessionId ? 'active' : ''}`;
        item.onclick = () => loadSession(session.id);
        
        const date = new Date(session.id).toLocaleString('id-ID', { day: '2-digit', month: 'short' });
        const snippet = session.messages.find(m => m.role === 'user')?.content || 'Belum ada isi...';
        
        item.innerHTML = `
            <span class="history-date">${session.title}</span>
            <div class="history-snippet">${date} - ${snippet}</div>
            <div class="item-actions">
                <button class="btn-small edit" onclick="renameSession(${session.id}, event)">✎</button>
                <button class="btn-small delete" onclick="deleteSession(${session.id}, event)">✕</button>
            </div>
        `;
        list.appendChild(item);
    });
}

    function loadSession(id) {
        currentSessionId = id;
        renderHistory();
        renderChat();
        if (window.innerWidth < 768) toggleSidebar();
    }


    function renderChat() {
        const chatWindow = document.getElementById('chatWindow');
        chatWindow.innerHTML = '';
        const session = allSessions.find(s => s.id === currentSessionId);
        if (!session) return;

        session.messages.forEach((msg, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = `bubble-wrapper ${msg.role === 'user' ? 'user' : 'bot'}`;
            
            const timeStr = new Date(msg.timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            const readMark = (msg.role === 'user' && msg.isRead) ? '<span class="read-mark">Read</span>' : '';

            wrapper.innerHTML = `
                <div class="bubble">${msg.content}</div>
                <div class="meta">${readMark}${timeStr}</div>
            `;
            chatWindow.appendChild(wrapper);
        });
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function sendUserMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;

        const session = allSessions.find(s => s.id === currentSessionId);
        const msgIndex = session.messages.length;
        
        const newMsg = {
            role: 'user',
            content: text,
            timestamp: new Date().toISOString(),
            isRead: false
        };

        session.messages.push(newMsg);
        input.value = '';
        saveToDisk();
        renderChat();
        renderHistory();

        // Read receipt simulation
        setTimeout(() => {
            const s = allSessions.find(s => s.id === currentSessionId);
            if(s && s.messages[msgIndex]) s.messages[msgIndex].isRead = true;
            saveToDisk();
            renderChat();
        }, 1000);
    }

    async function requestGroqAnswer() {
        const apiKey = document.getElementById('groqApiKey').value;
        const session = allSessions.find(s => s.id === currentSessionId);
        
        if (!apiKey || !session || session.messages.length === 0) return alert("Cek API Key / Meracau dulu!");

        const systemPrompt = document.getElementById('systemPrompt').value;
        const messagesForAPI = [{ role: "system", content: systemPrompt }, ...session.messages.map(m => ({ role: m.role, content: m.content }))];

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "meta-llama/llama-4-scout-17b-16e-instruct",
                    messages: messagesForAPI
                })
            });
            const data = await response.json();
            const botReply = data.choices[0].message.content;

            session.messages.push({
                role: 'assistant',
                content: botReply,
                timestamp: new Date().toISOString()
            });
            saveToDisk();
            renderChat();
        } catch (e) { alert("Error: " + e.message); }
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    function copyCurrentSession() {
        const session = allSessions.find(s => s.id === currentSessionId);
        navigator.clipboard.writeText(JSON.stringify(session, null, 2));
        alert("Session JSON copied!");
    }
    // Support Enter untuk send, Shift+Enter untuk baris baru
document.getElementById('messageInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault(); // Mencegah enter murni bikin baris baru
        sendUserMessage();
    }
});
</script>
</body>
</html>
