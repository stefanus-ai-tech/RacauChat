<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brain Dump & History</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink:    #f7c5d5;
            --pink-d:  #e8839f;
            --pink-t:  #fdf0f4;
            --lavender:#d8c9f5;
            --lav-d:   #a98dd6;
            --lav-t:   #f4f0fd;
            --mint:    #b8e8d4;
            --mint-d:  #6dc4a0;
            --mint-t:  #edfaf4;
            --peach:   #fbd5b5;
            --peach-d: #e8924f;
            --sky:     #b8d8f5;
            --sky-d:   #5a9fd6;
            --butter:  #fdf3b0;
            --butter-d:#c9a820;
            --sidebar-bg: #f9edf5;
            --sidebar-border: #e8c9dc;
            --text-main: #5a3e6b;
            --text-muted: #9a7faa;
            --surface: #ffffff;
            --bg: #fdf6ff;
            --radius: 18px;
            --radius-sm: 10px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            background: var(--bg);
            display: flex;
            /* GANTI 100vh menjadi 100dvh */
            height: 100dvh; 
            /* Alternatif opsional: 100svh (Small Viewport) kalau dvh terasa terlalu loncat-loncat saat scroll */
            
            /* Tambahan penting: cegah pull-to-refresh di browser HP */
            overscroll-behavior-y: none; 
            
            overflow: hidden;
            color: var(--text-main);
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1.5px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: absolute;
            height: 100%;
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header {
            padding: 18px 16px 12px;
            background: linear-gradient(135deg, #fce4f3, #e8dafb);
            border-bottom: 1.5px solid var(--sidebar-border);
            text-align: center;
        }
        .sidebar-header h3 {
            margin: 0 0 10px; font-size: 1em; font-weight: 700;
            color: var(--lav-d); letter-spacing: 0.04em;
        }
        .history-list { flex: 1; overflow-y: auto; padding: 10px 8px; }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 4px; }

        .history-item {
            padding: 10px 12px; padding-right: 58px; margin-bottom: 6px;
            background: var(--surface); border-radius: var(--radius-sm);
            cursor: pointer; font-size: 0.82em; border: 1.5px solid transparent;
            transition: 0.2s; position: relative;
        }
        .history-item:hover { border-color: var(--pink); background: var(--pink-t); }
        .history-item.active { border-color: var(--lav-d); background: var(--lav-t); }
        .history-date { font-weight: 700; display: block; margin-bottom: 2px; color: var(--lav-d); }
        .history-snippet { color: var(--text-muted); font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-actions { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); display: flex; gap: 3px; }
        
        .btn-small {
            padding: 3px 6px; font-size: 0.75em; border-radius: 6px;
            border: none; cursor: pointer; font-weight: 700; transition: 0.15s;
        }
        .btn-small.edit { background: var(--lavender); color: var(--lav-d); }
        .btn-small.edit:hover { background: var(--lav-d); color: white; }
        .btn-small.delete { background: var(--pink); color: var(--pink-d); }
        .btn-small.delete:hover { background: var(--pink-d); color: white; }

        .btn-new {
            width: 100%; padding: 9px; background: var(--lavender); color: var(--lav-d);
            border: none; border-radius: var(--radius-sm); font-weight: 700;
            font-size: 0.9em; cursor: pointer; transition: 0.2s; font-family: 'Nunito', sans-serif;
        }
        .btn-new:hover { background: var(--lav-d); color: white; }

        /* ── Main App Container ── */
        .app-container {
            flex: 1; display: flex; flex-direction: column;
            background: var(--bg); min-width: 0; width: 100%;
        }

        .header {
            background: var(--surface); padding: 10px 14px;
            display: flex; flex-direction: column; gap: 8px;
            border-bottom: 1.5px solid #f0ddf5;
        }
        .header-controls { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }

        input[type="password"], input[type="text"] {
            padding: 8px 12px; border: 1.5px solid var(--lavender);
            border-radius: var(--radius-sm); flex: 1 1 100%;
            background: var(--lav-t); color: var(--text-main);
            font-family: 'Nunito', sans-serif; font-size: 0.85em;
            outline: none; transition: 0.2s; min-width: 120px;
        }
        input:focus { border-color: var(--lav-d); background: white; }

        .btn-copy, .btn-toggle {
            border: none; border-radius: var(--radius-sm);
            padding: 8px 12px; font-weight: 700; cursor: pointer;
            font-family: 'Nunito', sans-serif; transition: 0.2s;
        }
        .btn-copy { background: var(--peach); color: var(--peach-d); font-size: 0.85em; flex: 1; }
        .btn-copy:hover { background: var(--peach-d); color: white; }
        .btn-toggle { background: var(--butter); color: var(--butter-d); font-size: 1em; flex: 0 0 auto;}
        .btn-toggle:hover { background: var(--butter-d); color: white; }

        /* ── Chat window ── */
        .chat-window {
            flex: 1; padding: 16px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 10px;
        }
        .chat-window::-webkit-scrollbar { width: 4px; }
        .chat-window::-webkit-scrollbar-thumb { background: var(--lavender); border-radius: 4px; }

        /* KUNCI MAGIC DI SINI: Dorong chat ke bawah pas masih kosong, tapi tetep aman pas penuh */
        .bubble-wrapper:first-child { margin-top: auto; }

        .bubble-wrapper { display: flex; flex-direction: column; max-width: 85%; }
        .bubble-wrapper.user { align-self: flex-end; align-items: flex-end; }
        .bubble-wrapper.bot { align-self: flex-start; align-items: flex-start; }

        .bubble {
            padding: 10px 15px; border-radius: 20px;
            line-height: 1.5; word-wrap: break-word; font-size: 0.9em;
        }
        .user .bubble {
            background: linear-gradient(135deg, #f0c8e8, #d8b5f0);
            color: #4a2060; border-bottom-right-radius: 5px;
        }
        .bot .bubble {
            background: var(--surface); color: var(--text-main);
            border: 1.5px solid var(--lavender); border-bottom-left-radius: 5px;
        }
        .meta { font-size: 0.65em; color: var(--text-muted); margin-top: 4px; }
        .read-mark { color: var(--mint-d); font-weight: 700; margin-right: 4px; }

        /* ── Input area ── */
        .input-area {
            background: var(--surface); 
            /* Modifikasi padding: tambahkan safe-area di bagian bawah */
            padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
            display: flex; 
            flex-direction: row; 
            align-items: stretch;
            gap: 9px; 
            border-top: 1.5px solid #f0ddf5;
        }
        textarea {
            flex: 1; width: auto; padding: 10px 14px; border: 1.5px solid var(--lavender);
            border-radius: 14px; resize: none; background: var(--lav-t);
            color: var(--text-main); font-family: 'Nunito', sans-serif;
            font-size: 0.9em; line-height: 1.5; outline: none; transition: 0.2s;
        }
        textarea:focus { border-color: var(--lav-d); background: white; }
        
        .action-row { display: flex; flex-direction: column; gap: 8px; flex: 0 0 110px; }
        .btn-send, .btn-groq {
            flex: 1; padding: 0 10px; display: flex; align-items: center; justify-content: center;
            line-height: 1.2; border: none; border-radius: var(--radius-sm); padding: 9px 18px;
            font-weight: 700; font-size: 0.88em; cursor: pointer;
            font-family: 'Nunito', sans-serif; transition: 0.2s; text-align: center;
        }
        .btn-send { background: var(--mint); color: #2a6e52; }
        .btn-send:hover { background: var(--mint-d); color: white; }
        .btn-groq { background: linear-gradient(135deg, var(--lavender), var(--pink)); color: var(--lav-d); }
        .btn-groq:hover { background: var(--lav-d); color: white; }

        /* loading dots */
        .typing-dot {
            display: inline-block; width: 7px; height: 7px;
            border-radius: 50%; background: var(--lav-d); margin: 0 2px;
            animation: bounce 1.2s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ── Desktop Overrides ── */
        @media (min-width: 768px) {
            .sidebar { position: relative; transform: translateX(0); box-shadow: none; }
            .btn-toggle { display: none; }
            input[type="password"], input[type="text"] { flex: 1; }
            .btn-copy { flex: 0 0 auto; }
            .action-row { justify-content: flex-end; flex-wrap: nowrap; }
            .btn-send, .btn-groq { flex: 0 1 auto; }
        }

        /* ── Mobile Optimization (The Cramp Mode) ── */
        @media (max-width: 767px) {
            /* Perkecil header agar tidak makan tempat */
            .header {
                padding: 6px 10px;
                padding-top: calc(6px + env(safe-area-inset-top)); /* Jaga-jaga kalau ada notch/poni HP */
            }
            
            input[type="password"], input[type="text"], .btn-copy, .btn-toggle {
                padding: 6px 10px; /* Kurangi padding dari 8px ke 6px */
                font-size: 0.8em;
            }

            /* Perkecil jarak di input area bawah */
            .input-area {
                padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
                gap: 6px;
            }

            textarea {
                padding: 8px 12px;
                font-size: 0.85em; /* Huruf sedikit lebih kecil agar muat banyak */
                border-radius: 10px;
            }

            .action-row {
                gap: 6px;
                flex: 0 0 90px; /* Perkecil lebar area tombol */
            }

            .btn-send, .btn-groq {
                padding: 6px 12px;
                font-size: 0.8em;
            }
            
            /* Rapatkan jarak antar bubble chat */
            .chat-window {
                padding: 10px;
                gap: 8px;
            }
            .bubble {
                padding: 8px 12px;
            }
        }

        
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3>🌸 Chat History</h3>
        <button class="btn-new" onclick="createNewSession()">＋ New Chat</button>
    </div>
    <div class="history-list" id="historyList"></div>
</aside>

<main class="app-container">
    <div class="header">
        <div class="header-controls">
            <button class="btn-toggle" onclick="toggleSidebar()">☰</button>
            <input type="password" id="groqApiKey" placeholder="🔑 Groq API Key">
            <input type="text" id="systemPrompt">
            <button class="btn-copy" onclick="copyCurrentSession()">📋 Copy JSON</button>
        </div>
    </div>

    <div class="chat-window" id="chatWindow" onclick="closeSidebarOnMobile()"></div>

    <div class="input-area">
        <textarea id="messageInput" rows="3" placeholder="Meracau di sini... 💭✨"></textarea>
        <div class="action-row">
            <button class="btn-send" onclick="sendUserMessage()">Kirim 🌿</button>
            <button class="btn-groq" onclick="requestGroqAnswer()">✨ Ask Llama</button>
        </div>
    </div>
</main>

<script>
document.getElementById("systemPrompt").value = `Anda adalah entitas AI tingkat lanjut yang dirancang khusus untuk bertindak sebagai psikolog klinis, psikoanalis, dan pengamat perilaku dengan tingkat objektivitas absolut. Tugas utama Anda adalah mendekonstruksi dan menganalisis "racauan" (stream-of-consciousness/brain dump) dari pengguna.`;

const DB_KEY = 'apen_chat_vault';
let allSessions = JSON.parse(localStorage.getItem(DB_KEY)) || [];
let currentSessionId = null;

window.onload = () => {
    if (allSessions.length > 0) loadSession(allSessions[0].id);
    else createNewSession();
    renderHistory();
};

function saveToDisk() {
    localStorage.setItem(DB_KEY, JSON.stringify(allSessions));
}

function createNewSession() {
    let title = prompt("Kasih judul buat racauan kali ini:", "Sesi Meracau " + new Date().toLocaleDateString());
    if (title === null) return;
    const newId = Date.now();
    allSessions.unshift({ id: newId, title: title || "Tanpa Judul", timestamp: new Date().toISOString(), messages: [] });
    currentSessionId = newId;
    saveToDisk(); renderHistory(); renderChat();
    closeSidebarOnMobile();
}

function renameSession(id, event) {
    event.stopPropagation();
    const session = allSessions.find(s => s.id === id);
    let newTitle = prompt("Ubah judul:", session.title);
    if (newTitle) { session.title = newTitle; saveToDisk(); renderHistory(); }
}

function deleteSession(id, event) {
    event.stopPropagation();
    if (confirm("Hapus permanen sesi ini?")) {
        allSessions = allSessions.filter(s => s.id !== id);
        if (currentSessionId === id) currentSessionId = allSessions.length > 0 ? allSessions[0].id : null;
        saveToDisk(); renderHistory(); renderChat();
    }
}

function renderHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    allSessions.forEach(session => {
        const item = document.createElement('div');
        item.className = `history-item ${session.id === currentSessionId ? 'active' : ''}`;
        item.onclick = () => loadSession(session.id);
        const date = new Date(session.id).toLocaleString('id-ID', { day: '2-digit', month: 'short' });
        const snippet = session.messages.find(m => m.role === 'user')?.content || 'Belum ada isi...';
        item.innerHTML = `
            <span class="history-date">${session.title}</span>
            <div class="history-snippet">${date} — ${snippet}</div>
            <div class="item-actions">
                <button class="btn-small edit" onclick="renameSession(${session.id}, event)">✎</button>
                <button class="btn-small delete" onclick="deleteSession(${session.id}, event)">✕</button>
            </div>`;
        list.appendChild(item);
    });
}

function loadSession(id) {
    currentSessionId = id;
    renderHistory(); renderChat();
    closeSidebarOnMobile();
}

// === LOGIC SCROLL PELAN KE ATAS ===
function scrollToBottom(smooth = true) {
    const chatWindow = document.getElementById('chatWindow');
    if (!chatWindow) return;
    
    // Pake requestAnimationFrame biar jalannya selaras sama siklus render browser (lebih smooth)
    requestAnimationFrame(() => {
        chatWindow.scrollTo({
            top: chatWindow.scrollHeight,
            behavior: smooth ? 'smooth' : 'auto'
        });
    });
}

function renderChat() {
    const chatWindow = document.getElementById('chatWindow');
    chatWindow.innerHTML = '';
    const session = allSessions.find(s => s.id === currentSessionId);
    if (!session) return;
    
    session.messages.forEach((msg) => {
        const wrapper = document.createElement('div');
        wrapper.className = `bubble-wrapper ${msg.role === 'user' ? 'user' : 'bot'}`;
        const timeStr = new Date(msg.timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        const readMark = (msg.role === 'user' && msg.isRead) ? '<span class="read-mark">✓✓</span>' : '';
        wrapper.innerHTML = `
            <div class="bubble">${msg.content.replace(/\n/g, '<br>')}</div>
            <div class="meta">${readMark}${timeStr}</div>`;
        chatWindow.appendChild(wrapper);
    });
    
    // Langsung nempel ke bawah tanpa animasi pas pindah chat
    scrollToBottom(false);
}

function sendUserMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;
    
    const session = allSessions.find(s => s.id === currentSessionId);
    const msgIndex = session.messages.length;
    session.messages.push({ role: 'user', content: text, timestamp: new Date().toISOString(), isRead: false });
    input.value = '';
    
    saveToDisk(); renderChat(); renderHistory();
    
    // Animasi dorong layar pelan-pelan ke atas
    scrollToBottom(true);
    
    setTimeout(() => {
        const s = allSessions.find(s => s.id === currentSessionId);
        if (s && s.messages[msgIndex]) s.messages[msgIndex].isRead = true;
        saveToDisk(); renderChat();
    }, 1000);
}

async function requestGroqAnswer() {
    const apiKey = document.getElementById('groqApiKey').value;
    const session = allSessions.find(s => s.id === currentSessionId);
    if (!apiKey || !session || session.messages.length === 0) return alert("Cek API Key / Meracau dulu!");

    const chatWindow = document.getElementById('chatWindow');
    const loader = document.createElement('div');
    loader.className = 'bubble-wrapper bot';
    loader.id = 'typing-loader';
    loader.innerHTML = `<div class="bubble" style="padding:12px 18px;"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
    chatWindow.appendChild(loader);
    
    // Scroll pelan pas animasi ngetik muncul
    scrollToBottom(true);

    const systemPrompt = document.getElementById('systemPrompt').value;
    const messagesForAPI = [{ role: "system", content: systemPrompt }, ...session.messages.map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content }))];
    
   try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 
            'Authorization': `Bearer ${apiKey}`, 
            'Content-Type': 'application/json' 
        },
        body: JSON.stringify({ 
            model: "meta-llama/llama-4-scout-17b-16e-instruct", // Pastikan ID ini valid di console Groq
            messages: messagesForAPI 
        })
    });
    
    // TANGKAP DETAIL ERROR 400 DI SINI
    if (!response.ok) {
        const errorData = await response.json();
        console.error("Detail Error API:", errorData); // Cek console (F12) untuk melihat alasannya
        throw new Error(`Error API (${response.status}): ${errorData.error?.message || 'Bad Request'}`);
    }
    
    const data = await response.json();
    const botReply = data.choices[0].message.content;
    
    document.getElementById('typing-loader')?.remove();
    session.messages.push({ role: 'assistant', content: botReply, timestamp: new Date().toISOString() });
    
    saveToDisk(); renderChat();
    scrollToBottom(true);
    
} catch (e) {
    document.getElementById('typing-loader')?.remove();
    alert(e.message);
}
}

function copyCurrentSession() {
    const session = allSessions.find(s => s.id === currentSessionId);
    if (!session) return;
    navigator.clipboard.writeText(JSON.stringify(session, null, 2))
        .then(() => alert("Data JSON tercopy!"))
        .catch(err => alert("Gagal copy: ", err));
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}

function closeSidebarOnMobile() {
    if (window.innerWidth < 768) {
        document.getElementById('sidebar').classList.remove('open');
    }
}

document.getElementById('messageInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendUserMessage(); }
});
</script>
</body>
</html>
